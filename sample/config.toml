# Sample hap (Herd Auto Prompter) configuration — every section with its
# default values, annotated. Copy into the plugin config dir reported by
# `herdr plugin config-dir herd-auto-prompter` and tune from there.
#
# Everything is optional: omitted keys fall back to their defaults, and
# invalid values are corrected to defaults rather than erroring. Edits
# apply live (the daemon is nudged, or picks them up on the next event).

# ── Decision confidence ─────────────────────────────────────────────
# Minimum agreement plus per-situation confidence a learned rule must reach.
[confidence_thresholds]
minimum = 0.50             # variance guard: lower scores are contradictory history
idle = 0.65
approval = 0.70
choice = 0.70
error = 0.75
inferred_task_bar = 0.60   # higher bar for tasks inferred from the agent's todo widget

# ── Shadow-mode learning ────────────────────────────────────────────
[learning]
graduation_n = 2           # consecutive consistent confirmations to graduate a rule (1-10)

# ── Safety (never-auto) ─────────────────────────────────────────────
[safety]
never_auto_patterns = []         # extra regexes that ALWAYS escalate (e.g. "rm -rf")
# allowlist_patterns = []        # DEPRECATED alias for never_auto_patterns (merged on load)
disable_never_auto_seed_patterns = false  # keep all shipped strict + heuristic rules (recommended)

# Agent-scoped never-auto rule (repeatable):
# [[safety.never_auto_rules]]
# pattern = "terraform (apply|destroy)"
# agent_types = ["claude", "codex"]  # "*" or empty = all agent types

# ── Rate limits ─────────────────────────────────────────────────────
[limits]
max_consecutive_auto_prompts = 10  # per agent, without human interaction
max_auto_prompts_per_minute = 5    # per agent
max_error_retries = 2              # per error signature

# ── Operator LLM (consulted on unknown situations) ──────────────────
# Omit this whole section to escalate unknown situations directly to you.
# Two recipes are shown below — Claude Code is active; the OpenAI Codex
# equivalent is commented out. Enable ONE `command` (comment the Claude
# keys and uncomment the Codex ones to switch).
[llm]
# ── Claude Code recipe (active) ──
# {self} = the hap binary, {request_id} is filled per consult, {agent_name}
# is the agent's short name ({db}/{control} also available). The prompt must
# come immediately after -p (claude quirk; the plugin auto-repairs it).
command = [
  "claude", "--model", "opus", "-p",
  "You are hap's auto-answer assistant. Use ONLY get_context and submit_decision.\n\nCall get_context, treat pane_excerpt as ground truth, and follow answer_format. If proposed_task is present, this is a task review: when the agent is ready and current_task is unfinished, prefer @next_task:declared to send it verbatim—do not make small edits. Return rewritten task text only when its details need a major rewrite. If current_task is clearly done, send an instruction for the next unfinished item in pending_tasks. Use @noop if the agent is busy, no suitable task remains, or evidence is ambiguous. Never invent a task.\n\nOtherwise: for approval/choice, select the safest option and deny destructive or irreversible work; for error, give one concrete recovery instruction; for idle, give the sensible next instruction or @noop.\n\nCall submit_decision with select_options for menus, otherwise recommend_action. Always include confident_score (0-100) and a one-sentence rationale.",
  "--mcp-config", '{"mcpServers":{"hap":{"command":"{self}","args":["mcp"],"env":{"HAP_REQUEST_ID":"{request_id}"}}}}',
  "--allowedTools", "mcp__hap__get_context,mcp__hap__submit_decision",
]

# ── First-consult variant (optional) ──
# command_start runs INSTEAD of command on an agent's very first consult
# this daemon lifetime (a new agent normally starts in a new pane and primes
# on its own; a subscriber reconnect does NOT re-fire it). Same
# placeholders/tools as command; use it for a priming/kickoff prompt or a
# stronger model on the first touch. Omit or leave empty to reuse command.
# If the preferred command exits with an error in under one second without
# submitting a decision, hap retries once with the other command template.
# command_start = [
#   "claude", "--model", "opus", "-p",
#   "This is your first interaction with this agent. ...same MCP flow as command...",
#   "--mcp-config", '{"mcpServers":{"hap":{"command":"{self}","args":["mcp"],"env":{"HAP_REQUEST_ID":"{request_id}"}}}}',
#   "--allowedTools", "mcp__hap__get_context,mcp__hap__submit_decision",
# ]

# ── OpenAI Codex CLI recipe (commented; swap in to use codex) ──
# The `exec` subcommand is required for headless runs (the plugin inserts
# it if you forget), and the bypass flag is needed because Codex's approval
# policy auto-denies MCP tool calls when headless — hap's own safety
# controls still re-gate every submission. Codex sanitizes the MCP server's
# environment, so the db/control paths must be passed explicitly via
# {db}/{control}.
# command = [
#   "codex", "--model", "gpt-5.6-terra", "exec", "--skip-git-repo-check",
#   "--dangerously-bypass-approvals-and-sandbox",
#   "-c", 'mcp_servers.hap.command="{self}"',
#   "-c", 'mcp_servers.hap.args=["mcp"]',
#   "-c", 'mcp_servers.hap.env.HAP_REQUEST_ID="{request_id}"',
#   "-c", 'mcp_servers.hap.env.HAP_DB_PATH="{db}"',
#   "-c", 'mcp_servers.hap.env.HAP_CONTROL_PATH="{control}"',
#   "You are hap's auto-answer assistant. Use ONLY get_context and submit_decision.\n\nCall get_context, treat pane_excerpt as ground truth, and follow answer_format. If proposed_task is present, this is a task review: when the agent is ready and current_task is unfinished, prefer @next_task:declared to send it verbatim—do not make small edits. Return rewritten task text only when its details need a major rewrite. If current_task is clearly done, send an instruction for the next unfinished item in pending_tasks. Use @noop if the agent is busy, no suitable task remains, or evidence is ambiguous. Never invent a task.\n\nOtherwise: for approval/choice, select the safest option and deny destructive or irreversible work; for error, give one concrete recovery instruction; for idle, give the sensible next instruction or @noop.\n\nCall submit_decision with select_options for menus, otherwise recommend_action. Always include confident_score (0-100) and a one-sentence rationale.",
# ]

timeout_seconds = 120              # codex is slower to start; 180 is a safer value there
auto_act_confidence_threshold = 999  # auto-act only when the LLM confidence (0-100) is >= this; 999 = never (surface for confirmation)
pane_excerpt_chars = 5000          # pane context included in the consult

# ── Outbound action review (optional) ──
# When a LEARNED rule resolves to free text (an idle next-task prompt, an
# error retry command, a free-text approval reply — never menu digits, and
# never a declared task from [[task_sources]], whose enable_llm_review gate
# owns that), the consult LLM above can review/adapt it to the live pane
# before delivery. The consult's get_context carries proposed_action; the
# LLM replies with the adapted text, "@proposed_action:send" to send the
# original unchanged, or "@noop" to send nothing. The review is advisory
# and NEVER blocks the send: on failure, timeout, or indecision the
# original text is delivered (auto_act_confidence_threshold does not apply
# here). Requires `command`; each reviewed send spends one consult.
# enable_rewrite_action = true
# On review failure the ORIGINAL text is sent as-is. Set
# rewrite_action_fallback_template only to wrap it instead (placeholders:
# {original_text}, {agent_name}).
# rewrite_action_fallback_template = "You must act based on the following: {original_text}"

# ── Idle task suggestion (optional) ──
# When an agent goes idle with NO task source (no [[task_sources]] matches it
# and nothing is inferable from the pane), a one-shot CLI can SUGGEST tasks.
# Its stdout is the suggestion (one task per line — plain text or a Markdown
# checklist; hap normalizes the format), surfaced as an escalation. Confirm it
# (enter/y) and hap writes a per-agent tasks.md whose FIRST task is in-progress
# ("[-]") and the rest pending ("[ ]"), registers it as a [[task_sources]]
# entry, and sends ONLY the first task to the agent (the remaining tasks are
# picked up by the normal declared-task flow on later idles). Dismiss (x) to
# ignore; if the CLI fails, retry with `l`. A suggestion is dropped/refused if
# the agent starts working before it is surfaced/confirmed. Placeholders:
# {self}, {agent_name}, {agent_type}, {pane_excerpt}, {cwd}. Omit to keep the
# safe default: idle with no task source escalates and hap synthesizes nothing.
#
# The same command also refills a declared [[task_sources]] entry once its
# checklist is fully checked off — but ONLY when BOTH task_generate_command
# and task_generate_command_start are set (below); a list already exists in
# that case, so task_generate_command is always used, never *_start. Without
# both set, an exhausted source escalates a confirmable @noop suggestion
# ("No more pending tasks") instead of the old "none" prompt.
# (Renamed from generate_task_command; the old key no longer loads — update it.)
task_generate_command = [
  "claude", "--model", "opus", "-p",
  "Suggest up to 3 concrete next tasks for this project's coding agent, in priority order. Reply ONLY with tasks, one per line.\n\nAgent: {agent_name}\nCwd: {cwd}\n\nScreen:\n{pane_excerpt}",
]

# ── Idle task suggestion — OpenAI Codex (commented; swap in to use codex) ──
# task_generate_command = [
#   "codex", "--model", "gpt-5.6-sol", "exec", "--skip-git-repo-check",
#   "Suggest up to 3 concrete next tasks for this project's coding agent, in priority order. Reply ONLY with tasks, one per line.\n\nAgent: {agent_name}\nCwd: {cwd}\n\nScreen:\n{pane_excerpt}",
# ]

# task_generate_command_start runs INSTEAD on the agent's first task generation
# (tracked independently); omit to reuse task_generate_command.
# task_generate_command_start = [ ... ]
task_generate_timeout_seconds = 300   # recommended; omitted: inherits timeout_seconds


# ── Semantic rule matching (vector embeddings) ──────────────────────
# Situations are matched to learned rules by embedding their masked salient
# content and vector-searching stored signatures, so a paraphrased prompt
# reuses the rule instead of re-learning from zero. Falls back to normalized
# BM25 text matching when the model is unavailable, then to exact hashing —
# llama.cpp runs in an isolated worker, so missing assets, stalls, and native
# worker aborts degrade matching without taking down the monitoring daemon.
[embedding]
disabled = false
model_path = ""             # "" = bundled <plugin>/models/all-minilm-l6-v2-q8_0.gguf; any .gguf works
similarity_threshold = 0.90 # min cosine to reuse a learned rule; outside (0,1) resets to 0.90
bm25_min_score = 0.35       # text-fallback floor when the model is unavailable, (0,1]
gpu_layers = 0              # inert in official builds (Metal/Vulkan compiled out; the
                            # bundled MiniLM runs in ms on CPU) — only meaningful if you
                            # rebuild llama-go with GPU on and use a larger model
# Input is token-truncated below the model's position limit before embedding.
# 0 uses the bundled MiniLM default (512); positive values below 256 are
# clamped to 256. NEVER set this above the real limit of model_path: an
# oversized context can make llama.cpp abort its isolated embed worker.
model_context_window = 0
# pane_salient_chars controls the fallback signature window: for idle/
# unclassified situations the signature (and its embedding) is minted from
# the trailing N characters of pane content. Omit or 0 → built-in default (500).
# Changing it re-keys idle/unclassified rules once (they re-learn); structured
# approval/choice/error rules are unaffected.
# pane_salient_chars = 500

# ── TUI ─────────────────────────────────────────────────────────────
[tui]
max_content_width = 0      # cap on variable-length list columns; 0 = full terminal width
max_content_height = 0     # expanded long-field lines; 0 = unlimited; collapsed uses short tails
theme = ""                 # named palette: default | dark | light | high-contrast;
                           # empty/unknown = default (the original look)
terminal_bell = true       # ring the terminal bell (\a) on new escalations and on
                           # pauses caused by a different process; default on

# Optional per-role color overrides layered on the selected theme; unset
# roles inherit the theme. Values are terminal colors ("205", "#ff5faf").
# [tui.palette]
# title = "205"
# section = "117"
# error = "196"
# ok = "46"
# paused = "196"
# running = "46"
# warn = "214"
# help = ""

# ── Declared task lists for idle agents (repeatable) ────────────────
# Without a declared source, the plugin falls back to inferring the next
# task from the agent's own todo rendering, held to inferred_task_bar, then
# uses task_generate_command (when configured) to surface a suggestion. When
# a declared source's checklist is fully checked off, the templated prompt is
# never sent: it escalates a confirmable @noop ("No more pending tasks")
# unless BOTH task_generate_command and task_generate_command_start are set,
# in which case more tasks are generated instead (see above).
# [[task_sources]]
# agent = ""                 # short name, pane id, or type; "" = any
# workspace = ""             # "" or "*" = any; wildcards like "codex-*" work
# path = "/home/me/project/docs/tasks.md"
# next_task_template placeholders: {next_task_content}, {task_list_path}, {agent_name}, {cwd}
# next_task_template = "Your next task is {next_task_content}.\nRead the full tasks list at {task_list_path}. Verify task dependencies before starting. Once you have completed your task, mark it as done (`[x]`) in the tasks list.\nIf you are unsure what to do, ask for clarification. When there is no task available, focus on improving the test coverage of this project."
# When an [llm].command is configured, each determined task is first REVIEWED by
# the LLM (via the get_context/submit_decision MCP tools): it sees the live pane
# and decides whether to send the task now (recommend_action) or skip it (@noop).
# The outcome follows auto_act_confidence_threshold symmetrically — a confident
# review is applied automatically (task sent, or silently skipped on a decline),
# a low-confidence one is surfaced for you to confirm (showing the LLM's
# recommendation and the original task). Default: on. Opt a source out to keep
# the plain declared-task flow:
# enable_llm_review = false
# Cap how many checklist items (done, in-progress, and pending) this source may
# hold before LLM task generation stops refilling it: once the file has MORE
# than max_tasks items and its pending items are exhausted, the daemon logs a
# warning and skips generation instead of piling more onto an already-long list
# — prune the checklist to make room. Default: 20 when unset.
# max_tasks = 20

# ── Custom classifier rules (repeatable, extend the built-ins) ──────
# [[classifier]]
# agent_type = "*"                      # "*" = any agent type
# situation = "approval"                # approval | choice | error | idle
# regex = ['(?i)shall I go ahead\?']
# keywords = ["waiting for approval"]

# ── Capture delay (repeatable; first matching rule wins) ────────────
# Delay before reading the pane after a herdr agent event, so the agent
# TUI has painted (avoids capturing shell scrollback at startup).
# A matched rule's unset (or 0) field uses the built-in default — later
# rules are not consulted; a true 0ms delay is not expressible (use 1).
# [[capture_delay]]
# agent_type = "claude"      # exact agent type, or "*" for any
# start_ms = 3000            # first event after the agent starts (default 10000)
# event_ms = 200             # subsequent events (default 2000)
