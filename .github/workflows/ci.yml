name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']
  pull_request:

permissions:
  contents: read

env:
  GO_BUILD_TAGS: vectors cpu

jobs:
  lint:
    name: Lint (gofmt, go vet, golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Native cache key (submodule commit)
        id: subsha
        run: echo "sha=$(git submodule status submodule/github.com/seed-hypermedia/llama-go | awk '{print substr($1,1,12)}' | tr -d '+-')" >> "$GITHUB_OUTPUT"
      - name: Cache native builds
        uses: actions/cache@v4
        with:
          path: |
            .cache/native
            submodule/github.com/seed-hypermedia/llama-go/*.a
            submodule/github.com/seed-hypermedia/llama-go/llama.cpp/**/*.o
          key: native-lint-${{ runner.os }}-${{ env.ImageOS }}-${{ hashFiles('scripts/setup-native.sh') }}-${{ steps.subsha.outputs.sha }}
      - name: Build native dependencies
        run: bash scripts/setup-native.sh
      - name: gofmt
        run: |
          out=$(gofmt -l . | grep -v '^submodule/' || true)
          if [ -n "$out" ]; then
            echo "gofmt violations:" && echo "$out" && exit 1
          fi
      - name: go vet
        run: go vet -tags "${GO_BUILD_TAGS}" ./...
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
          args: --build-tags "vectors,cpu"

  test:
    name: Tests (${{ matrix.os }})
    strategy:
      matrix:
        # One linux and one macos runner; CGO makes cross-compile checks
        # impossible, so the release matrix is the real multi-arch gate.
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Native cache key (submodule commit)
        id: subsha
        run: echo "sha=$(git submodule status submodule/github.com/seed-hypermedia/llama-go | awk '{print substr($1,1,12)}' | tr -d '+-')" >> "$GITHUB_OUTPUT"
      - name: Cache native builds
        uses: actions/cache@v4
        with:
          path: |
            .cache/native
            submodule/github.com/seed-hypermedia/llama-go/*.a
            submodule/github.com/seed-hypermedia/llama-go/llama.cpp/**/*.o
          key: native-test-${{ matrix.os }}-${{ env.ImageOS }}-${{ hashFiles('scripts/setup-native.sh') }}-${{ steps.subsha.outputs.sha }}
      - name: Build native dependencies
        run: bash scripts/setup-native.sh
      - name: Build
        run: go build -tags "${GO_BUILD_TAGS}" ./...
      - name: Full test suite (unit, golden, safety-invariant, concurrency, semantic-match)
        # macOS: test binaries need a dyld rpath to reach the FAISS dylibs
        # in /usr/local/lib (bleve docs: go test -ldflags "-r /usr/local/lib").
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            go test -ldflags "-r /usr/local/lib" -tags "${GO_BUILD_TAGS}" ./... -count=1 -timeout 15m
          else
            go test -tags "${GO_BUILD_TAGS}" ./... -count=1 -timeout 15m
          fi
      - name: Race detector
        # Runs the concurrency regressions under -race with the "vectors cpu"
        # tags on the standard (CPU-only) runners — notably internal/match's
        # TestMatcherConcurrentRebuildAndMatch and, under the vectors tag,
        # TestMatcherConcurrentRebuildAndMatchVector, which guard the
        # Rebuild-closes-the-index-mid-search deadlock (the vector variant hung
        # ~10m before the fix). Keep ./internal/match/... in PKGS so both stay
        # covered. The race detector is flaky under CI load; retry up to 2 times
        # (3 attempts total) before failing the job. -timeout caps a reintroduced
        # deadlock so it fails in minutes instead of the 10m default per attempt.
        run: |
          PKGS="./internal/store/... ./internal/domain/... ./internal/control/... ./internal/embedder/... ./internal/match/... ./internal/daemon/..."
          run_race() {
            if [ "$RUNNER_OS" = "macOS" ]; then
              go test -ldflags "-r /usr/local/lib" -tags "${GO_BUILD_TAGS}" $PKGS -race -count=1 -timeout 8m
            else
              go test -tags "${GO_BUILD_TAGS}" $PKGS -race -count=1 -timeout 8m
            fi
          }
          attempt=1
          max_attempts=3
          until run_race; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Race detector failed after $max_attempts attempts"
              exit 1
            fi
            echo "::warning::Race detector attempt $attempt failed; retrying ($((attempt + 1))/$max_attempts)"
            attempt=$((attempt + 1))
          done

  corpus-gate:
    name: Allowlist corpus regression gate (NFR-005a)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      # internal/domain is pure Go (TestDomainPurity), so no native deps
      # or build tags are needed here.
      - name: Seed patterns must catch 100% of the irreversible-op corpus
        # Guard against the -run pattern silently matching nothing (go test
        # exits 0 with "no tests to run"): require the PASS line explicitly.
        run: |
          go test ./internal/domain/ -run 'TestSeedNeverAutoCatchesCorpus$' -v -count=1 | tee /tmp/corpus-gate.out
          grep -q -- '--- PASS: TestSeedNeverAutoCatchesCorpus' /tmp/corpus-gate.out \
            || { echo '::error::corpus gate did not execute TestSeedNeverAutoCatchesCorpus (test renamed?)'; exit 1; }
