name: Release

on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

env:
  GO_BUILD_TAGS: vectors cpu
  MODEL_URL: https://huggingface.co/sudomoniker/all-MiniLM-L6-v2-Q8_0-GGUF/resolve/main/all-minilm-l6-v2-q8_0.gguf
  MODEL_FILE: all-minilm-l6-v2-q8_0.gguf
  MODEL_SHA256: 606364fbf83de64c258ea9e011b74691d509d66292be0da612307488a46dfba5

jobs:
  gate:
    name: Full CI gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Native cache key (submodule commit)
        id: subsha
        run: echo "sha=$(git submodule status submodule/github.com/seed-hypermedia/llama-go | awk '{print substr($1,1,12)}' | tr -d '+-')" >> "$GITHUB_OUTPUT"
      - name: Cache native builds
        uses: actions/cache@v4
        with:
          path: |
            .cache/native
            submodule/github.com/seed-hypermedia/llama-go/*.a
            submodule/github.com/seed-hypermedia/llama-go/llama.cpp/**/*.o
          key: native-${{ runner.os }}-${{ runner.arch }}-${{ env.ImageOS }}-${{ hashFiles('scripts/setup-native.sh') }}-${{ steps.subsha.outputs.sha }}
      - name: Build native dependencies
        run: bash scripts/setup-native.sh
      - name: gofmt
        run: |
          out=$(gofmt -l . | grep -v '^submodule/' || true)
          if [ -n "$out" ]; then echo "$out" && exit 1; fi
      - run: go vet -tags "${GO_BUILD_TAGS}" ./...
      - run: go test -tags "${GO_BUILD_TAGS}" ./... -count=1 -timeout 15m

  build:
    name: Build ${{ matrix.target }}
    needs: gate
    strategy:
      matrix:
        include:
          # CGO cannot cross-compile, so each target builds on its own
          # native runner. Intel macOS (darwin-amd64) is deliberately
          # unsupported: Apple Silicon only.
          # Linux artifacts build on 22.04 deliberately: CGO binaries (and
          # the bundled FAISS libs) inherit the builder's glibc floor, and
          # 24.04's glibc 2.39 breaks Debian 12 / Ubuntu 22.04 hosts.
          - { os: ubuntu-22.04,     target: linux-amd64 }
          - { os: ubuntu-22.04-arm, target: linux-arm64 }
          - { os: macos-14,         target: darwin-arm64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Native cache key (submodule commit)
        id: subsha
        run: echo "sha=$(git submodule status submodule/github.com/seed-hypermedia/llama-go | awk '{print substr($1,1,12)}' | tr -d '+-')" >> "$GITHUB_OUTPUT"
      - name: Cache native builds
        uses: actions/cache@v4
        with:
          path: |
            .cache/native
            submodule/github.com/seed-hypermedia/llama-go/*.a
            submodule/github.com/seed-hypermedia/llama-go/llama.cpp/**/*.o
          key: native-${{ matrix.target }}-${{ env.ImageOS }}-${{ hashFiles('scripts/setup-native.sh') }}-${{ steps.subsha.outputs.sha }}
      - name: Build native dependencies
        run: bash scripts/setup-native.sh
      - name: Build hap binary
        run: |
          VERSION="${GITHUB_REF_NAME}"
          case "${{ matrix.target }}" in
            linux-*)  RPATH='-Wl,-rpath,$ORIGIN/../lib' ;;
            darwin-*) RPATH='-Wl,-rpath,@loader_path/../lib' ;;
          esac
          mkdir -p dist
          CGO_ENABLED=1 go build -tags "${GO_BUILD_TAGS}" -trimpath \
            -ldflags "-s -w -X github.com/0xGosu/herdr-auto-pilot/internal/buildinfo.Version=${VERSION} -extldflags '${RPATH}'" \
            -o "dist/hap-${{ matrix.target }}" ./cmd/hap
      - name: Bundle native runtime libraries
        run: |
          # llama.cpp is statically linked into the binary; only the FAISS
          # shared libs (plus libomp on macOS) ship, self-contained in one
          # lib/ dir the binary reaches via its <plugin>/lib rpath.
          set -euo pipefail
          case "${{ matrix.target }}" in
            linux-*)  EXT=so ;;
            darwin-*) EXT=dylib ;;
          esac
          mkdir -p bundle/lib
          cp ".cache/native/faiss/build/faiss/libfaiss.${EXT}" bundle/lib/
          cp ".cache/native/faiss/build/c_api/libfaiss_c.${EXT}" bundle/lib/
          cd bundle/lib
          # Inter-library resolution must work from the bundle dir alone.
          if [ "${EXT}" = "so" ]; then
            sudo apt-get install -y -qq patchelf
            # FAISS is built against OpenBLAS (its BLAS backend) plus libgomp,
            # and OpenBLAS in turn pulls in libgfortran + libquadmath. None of
            # these are guaranteed present on a target box (a bare Debian has
            # no libopenblas.so.0), so bundle the whole chain beside FAISS.
            # Copy by SONAME — the NEEDED string the loader matches on — not
            # the readlink -f real filename (libopenblasp-r*.so would not
            # resolve). Paths come from the runner's ldconfig so the
            # pthread-vs-openmp OpenBLAS variant doesn't matter.
            copy_soname() {
              local p
              p="$(ldconfig -p | awk -v s="$1" '$1==s {print $NF; exit}')"
              [ -n "$p" ] || { echo "cannot locate $1 on runner" >&2; exit 1; }
              cp -L "$p" "./$1"
            }
            for so in libopenblas.so.0 libgfortran.so.5 libquadmath.so.0 libgomp.so.1; do
              copy_soname "$so"
            done
            # DT_RUNPATH is NOT transitive: each bundled lib needs its own
            # $ORIGIN so it can find the next link in the chain. Glob *.so*
            # (not *.so) to catch versioned sonames like libgfortran.so.5.
            for f in *.so*; do
              [ -f "$f" ] || continue
              patchelf --set-rpath '$ORIGIN' "$f"
            done
            # Prove the bundle is self-contained: after patchelf, nothing may
            # resolve outside lib/ except an explicit base-system allowlist.
            # Fails the release on any drift (e.g. a future FAISS bump adding
            # an unbundled dep), instead of silently reshipping a broken lib/.
            allow='libc\.so|libm\.so|libpthread\.so|libdl\.so|librt\.so|ld-linux|libstdc\+\+\.so|libgcc_s\.so'
            # Match against the canonical dir: the loader resolves symlinks
            # when it expands $ORIGIN, so ldd prints realpaths — a symlinked
            # cwd would make correctly-bundled deps look like leaks.
            libdir="$(realpath "$PWD")"
            bad=0
            for f in *.so*; do
              [ -f "$f" ] || continue
              # Capture ldd (and its exit): a non-parseable lib must fail the
              # guard, not pass vacuously by reading zero lines.
              deps="$(ldd "$f")" || { echo "ldd failed on $f" >&2; bad=1; continue; }
              while read -r name arrow path _; do
                [ "$arrow" = "=>" ] || continue          # skip vdso / ld.so lines
                printf '%s' "$name" | grep -qE "$allow" && continue
                case "$path" in
                  "$libdir/"*) : ;;                       # good: resolved inside lib/
                  not) echo "UNRESOLVED $name (needed by $f)" >&2; bad=1 ;;
                  *) echo "LEAK $name -> $path (needed by $f)" >&2; bad=1 ;;
                esac
              done <<< "$deps"
            done
            [ "$bad" = 0 ] || { echo "native bundle is not self-contained" >&2; exit 1; }
          else
            install_name_tool -id '@rpath/libfaiss.dylib' libfaiss.dylib
            install_name_tool -id '@rpath/libfaiss_c.dylib' libfaiss_c.dylib
            dep=$(otool -L libfaiss_c.dylib | awk 'NR>1 && /libfaiss[^_]/ {print $1; exit}')
            [ -n "$dep" ] && install_name_tool -change "$dep" '@rpath/libfaiss.dylib' libfaiss_c.dylib
            # FAISS is built with Homebrew LLVM's OpenMP; ship libomp and
            # rewire both libs to load it from the bundle.
            cp "$(brew --prefix llvm)/lib/libomp.dylib" .
            install_name_tool -id '@rpath/libomp.dylib' libomp.dylib
            for f in libfaiss.dylib libfaiss_c.dylib; do
              omp=$(otool -L "$f" | awk 'NR>1 && /libomp/ {print $1; exit}')
              [ -n "$omp" ] && install_name_tool -change "$omp" '@rpath/libomp.dylib' "$f" || true
            done
            for f in *.dylib; do
              install_name_tool -add_rpath '@loader_path' "$f" 2>/dev/null || true
            done
            # Ad-hoc sign after mutation (required on arm64 macOS).
            codesign --force -s - ./*.dylib
          fi
          cd ..
          tar -czf "../dist/hap-native-${{ matrix.target }}.tar.gz" lib
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*
          retention-days: 3

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Fetch embedding model (Hugging Face)
        run: |
          curl -fsSL --retry 5 --retry-delay 10 -o "dist/${MODEL_FILE}" "${MODEL_URL}"
          echo "${MODEL_SHA256}  dist/${MODEL_FILE}" | sha256sum -c -
      - name: Checksums
        run: cd dist && sha256sum * > SHA256SUMS
      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
